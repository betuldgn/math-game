<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uzay Macerası – Matematik Oyunu</title>
<style>
  /* ── Temel Değişkenler ─────────────────────────────── */
  :root {
    --bg-deep:    #060b1f;
    --bg-mid:     #0e1a3a;
    --bg-card:    #131e45;
    --accent:     #7b5cfa;
    --accent2:    #ff6b9d;
    --gold:       #ffd666;
    --green:      #3dffa0;
    --red:        #ff4d6d;
    --text:       #e8eeff;
    --text-muted: #8899cc;
    --radius:     18px;
  }

  /* ── Reset & Temel ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Yıldız Arka Planı ─────────────────────────────── */
  #star-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Ana Sarmalayıcı ────────────────────────────────── */
  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ── Başlık ─────────────────────────────────────────── */
  .game-title {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 6px;
  }
  .game-subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── İlerleme Çubuğu ────────────────────────────────── */
  .progress-wrap {
    width: min(480px, 100%);
    margin-bottom: 24px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: var(--bg-card);
    border-radius: 999px;
    border: 1px solid rgba(123, 92, 250, 0.25);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* ── Kart ───────────────────────────────────────────── */
  .card {
    width: min(520px, 100%);
    background: var(--bg-card);
    border: 1px solid rgba(123, 92, 250, 0.22);
    border-radius: var(--radius);
    padding: 32px 28px 28px;
    box-shadow: 0 0 60px rgba(123, 92, 250, 0.12);
  }

  /* ── Level Rozeti ───────────────────────────────────── */
  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(255, 214, 102, 0.12);
    border: 1px solid rgba(255, 214, 102, 0.3);
    border-radius: 999px;
    padding: 4px 12px;
    margin-bottom: 16px;
  }

  /* ── Soru Alanı ─────────────────────────────────────── */
  .question-emoji {
    font-size: 2.8rem;
    text-align: center;
    margin-bottom: 10px;
    line-height: 1;
    /* emojiler için text-fill sıfırlama */
    -webkit-text-fill-color: initial;
  }
  .question-text {
    font-size: clamp(1.05rem, 3vw, 1.25rem);
    font-weight: 600;
    line-height: 1.5;
    text-align: center;
    color: var(--text);
    margin-bottom: 28px;
    min-height: 64px;
  }
  .question-text span.highlight {
    color: var(--gold);
  }

  /* ── Şık Butonları ──────────────────────────────────── */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .choice-btn {
    width: 100%;
    padding: 15px 22px;
    background: rgba(123, 92, 250, 0.10);
    border: 1.5px solid rgba(123, 92, 250, 0.30);
    border-radius: 12px;
    color: var(--text);
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .choice-btn:hover:not(:disabled) {
    background: rgba(123, 92, 250, 0.22);
    border-color: rgba(123, 92, 250, 0.7);
    transform: translateY(-2px);
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.97); }
  .choice-btn:disabled { cursor: not-allowed; opacity: 0.7; }

  /* Doğru animasyonu */
  .choice-btn.correct {
    background: rgba(61, 255, 160, 0.18);
    border-color: var(--green);
    color: var(--green);
  }
  /* Yanlış animasyonu */
  .choice-btn.wrong {
    background: rgba(255, 77, 109, 0.18);
    border-color: var(--red);
    color: var(--red);
    animation: shake 0.45s ease;
  }

  /* ── Shake Animasyonu ───────────────────────────────── */
  @keyframes shake {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-10px); }
    30%  { transform: translateX(10px); }
    45%  { transform: translateX(-8px); }
    60%  { transform: translateX(8px); }
    75%  { transform: translateX(-4px); }
    90%  { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }

  /* ── Geri Bildirim Mesajı ───────────────────────────── */
  .feedback {
    min-height: 28px;
    text-align: center;
    font-size: 0.92rem;
    font-weight: 600;
    margin-top: 18px;
    transition: opacity 0.3s;
  }
  .feedback.ok  { color: var(--green); }
  .feedback.err { color: var(--red); }

  /* ── Bitiş Ekranı ───────────────────────────────────── */
  #finish-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: min(520px, 100%);
  }
  #finish-screen.show { display: flex; }

  .finish-emoji {
    font-size: 4.5rem;
    line-height: 1;
    margin-bottom: 16px;
    animation: floatUp 1.2s ease infinite alternate;
  }
  @keyframes floatUp {
    from { transform: translateY(0); }
    to   { transform: translateY(-14px); }
  }
  .finish-title {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: 800;
    background: linear-gradient(90deg, var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .finish-sub {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 32px;
  }
  .restart-btn {
    padding: 15px 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
  }
  .restart-btn:hover { opacity: 0.88; transform: scale(1.04); }

  /* ── Konfeti Parçaları ──────────────────────────────── */
  .confetti-piece {
    position: fixed;
    top: -20px;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* ── Başlangıç Ekranı ───────────────────────────────── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: min(520px, 100%);
  }
  #start-screen.hidden { display: none; }

  .start-emoji { font-size: 5rem; margin-bottom: 18px; animation: floatUp 1.4s ease infinite alternate; }
  .start-title {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(90deg, #7b5cfa, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .start-desc {
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 360px;
  }
  .start-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .start-btn:hover { opacity: 0.88; transform: scale(1.04); }

  /* Ekran geçiş yardımcısı */
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
  .screen.active { display: flex; }
  /* Başlangıç ekranı varsayılan görünür */
  #start-screen { display: flex; flex-direction: column; align-items: center; text-align: center; width: min(520px, 100%); }
</style>
</head>
<body>

<!-- Yıldızlı arka plan kancası -->
<canvas id="star-canvas"></canvas>

<div id="app">

  <!-- ═══ BAŞLANGIÇ EKRANI ═══ -->
  <div id="start-screen">
    <div class="start-emoji">🚀</div>
    <h1 class="start-title">Uzay Macerası</h1>
    <p class="start-desc">
      Görevini tamamlamak için 3 matematik bulmacasını çöz,
      roketi yönlendir ve gezegene in!
    </p>
    <button class="start-btn" id="start-btn">Göreve Başla 🛸</button>
  </div>

  <!-- ═══ OYUN ALANI ═══ -->
  <div id="game-screen" style="display:none; flex-direction:column; align-items:center; width:100%;">
    
    <!-- İlerleme çubuğu -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="level-info">Aşama 1 / 3</span>
        <span id="level-name">Isınma</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Soru Kartı -->
    <div class="card">
      <div class="level-badge" id="badge-text">⚡ Level 1</div>
      <div class="question-emoji" id="q-emoji">🛸</div>
      <div class="question-text" id="q-text">Yükleniyor…</div>
      <div class="choices" id="choices-wrap"></div>
      <div class="feedback" id="feedback"></div>
    </div>

  </div>

  <!-- ═══ BİTİŞ EKRANI ═══ -->
  <div id="finish-screen">
    <div class="finish-emoji">🏆</div>
    <h2 class="finish-title">Gezegene Başarıyla İndin!</h2>
    <p class="finish-sub">🎉 Görev Tamamlandı! Tüm matematik bulmacalarını çözdün. 🚀</p>
    <button class="restart-btn" id="restart-btn">🔄 Tekrar Oyna</button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   YILDIZ ARKA PLAN — Canvas
═══════════════════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('star-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    buildStars();
  }

  function buildStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 4500);
    for (let i = 0; i < count; i++) {
      stars.push({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        r:  Math.random() * 1.5 + 0.3,
        a:  Math.random(),
        da: (Math.random() * 0.005 + 0.001) * (Math.random() > 0.5 ? 1 : -1)
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    /* Uzay gradyanı */
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0,   '#060b1f');
    grad.addColorStop(0.5, '#0e0a2e');
    grad.addColorStop(1,   '#060b1f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    /* Yıldızlar */
    for (const s of stars) {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a.toFixed(2)})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

/* ═══════════════════════════════════════════════════════════
   SES MOTORU — Web Audio API (kütüphane gerekmez)
═══════════════════════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;

  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  /* Başarı: iki yükselen nota */
  function success() {
    init();
    const now = ctx.currentTime;
    [[440, 0], [550, 0.12], [660, 0.24], [880, 0.36]].forEach(([freq, t]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type      = 'sine';
      osc.frequency.setValueAtTime(freq, now + t);
      gain.gain.setValueAtTime(0.22, now + t);
      gain.gain.exponentialRampToValueAtTime(0.001, now + t + 0.35);
      osc.start(now + t);
      osc.stop(now + t + 0.4);
    });
  }

  /* Hata: alçalan buzzer */
  function error() {
    init();
    const now  = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.35);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
    osc.start(now);
    osc.stop(now + 0.4);
  }

  /* Bitiş fanfarı */
  function fanfare() {
    init();
    const now = ctx.currentTime;
    [[523, 0], [659, 0.15], [784, 0.30], [1047, 0.45], [784, 0.65], [1047, 0.8]].forEach(([f, t]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(f, now + t);
      gain.gain.setValueAtTime(0.25, now + t);
      gain.gain.exponentialRampToValueAtTime(0.001, now + t + 0.45);
      osc.start(now + t);
      osc.stop(now + t + 0.5);
    });
  }

  return { success, error, fanfare };
})();

/* ═══════════════════════════════════════════════════════════
   KONFET — Emoji yağmuru
═══════════════════════════════════════════════════════════ */
function spawnConfetti() {
  const symbols = ['🚀','⭐','🌟','✨','🎉','💫','🪐','🛸','🌠','🎊'];
  for (let i = 0; i < 48; i++) {
    const el  = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left     = Math.random() * 100 + 'vw';
    el.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
    const dur = (2.5 + Math.random() * 2.5).toFixed(1);
    const del = (Math.random() * 2).toFixed(2);
    el.style.animation = `confettiFall ${dur}s ${del}s linear forwards`;
    document.body.appendChild(el);
    /* Animasyon bitince temizle */
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ═══════════════════════════════════════════════════════════
   OYUN VERİSİ — 3 Level
═══════════════════════════════════════════════════════════ */
const LEVELS = [
  {
    badge:    '⚡ Level 1',
    name:     'Isınma',
    emoji:    '🚀',
    question: 'Roketin yakıt tankını açmak için <span class="highlight">x</span> değerini bul:<br><br>2x + 5 = 15',
    choices:  ['5', '10', '4'],
    correct:  '5',
    feedbackOk:  '🔥 Harika! Yakıt tankı açıldı!',
    feedbackErr: '❌ Hata! Hesabı tekrar dene.'
  },
  {
    badge:    '🛡️ Level 2',
    name:     'Orta',
    emoji:    '🛡️',
    question: 'Kalkanları şarj et:<br><br><span class="highlight">1/2 + 1/4 = ?</span>',
    choices:  ['3/4', '2/6', '1/8'],
    correct:  '3/4',
    feedbackOk:  '⚡ Mükemmel! Kalkanlar şarj oldu!',
    feedbackErr: '❌ Yanlış! Kesirleri tekrar düşün.'
  },
  {
    badge:    '🔐 Level 3',
    name:     'Şifre',
    emoji:    '🪐',
    question: 'Gezegene inmek için şifreyi çöz:<br><br><span class="highlight">Hangi sayının yarısının 3 fazlası 10'dur?</span>',
    choices:  ['14', '17', '20'],
    correct:  '14',
    feedbackOk:  '🏆 Şifreyi kırdın! İnişe hazır!',
    feedbackErr: '❌ Yanlış kod! Tekrar dene.'
  }
];

/* ═══════════════════════════════════════════════════════════
   OYUN MOTORU
═══════════════════════════════════════════════════════════ */
const Game = (() => {
  let currentLevel = 0;
  let locked       = false; /* çift tıklamayı engeller */

  /* DOM referansları */
  const $start    = document.getElementById('start-screen');
  const $game     = document.getElementById('game-screen');
  const $finish   = document.getElementById('finish-screen');
  const $progress = document.getElementById('progress-fill');
  const $levelInfo= document.getElementById('level-info');
  const $levelName= document.getElementById('level-name');
  const $badge    = document.getElementById('badge-text');
  const $emoji    = document.getElementById('q-emoji');
  const $question = document.getElementById('q-text');
  const $choices  = document.getElementById('choices-wrap');
  const $feedback = document.getElementById('feedback');

  function showOnly(el) {
    [$start, $game, $finish].forEach(e => { e.style.display = 'none'; });
    el.style.display = 'flex';
  }

  /* Oyunu başlat */
  function start() {
    currentLevel = 0;
    locked = false;
    showOnly($game);
    renderLevel();
  }

  /* Mevcut seviyeyi ekrana çiz */
  function renderLevel() {
    locked = false;
    const lvl = LEVELS[currentLevel];

    /* İlerleme çubuğunu güncelle */
    const pct = (currentLevel / LEVELS.length) * 100;
    $progress.style.width = pct + '%';
    $levelInfo.textContent = `Aşama ${currentLevel + 1} / ${LEVELS.length}`;
    $levelName.textContent = lvl.name;

    /* Kart içeriği */
    $badge.textContent    = lvl.badge;
    $emoji.textContent    = lvl.emoji;
    $question.innerHTML   = lvl.question;
    $feedback.textContent = '';
    $feedback.className   = 'feedback';

    /* Şık butonlarını oluştur */
    $choices.innerHTML = '';
    lvl.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className   = 'choice-btn';
      btn.textContent = c;
      btn.addEventListener('click', () => handleAnswer(btn, c));
      $choices.appendChild(btn);
    });
  }

  /* Şık tıklandığında */
  function handleAnswer(btn, answer) {
    if (locked) return;
    locked = true;

    const lvl     = LEVELS[currentLevel];
    const isRight = (answer === lvl.correct);

    $choices.querySelectorAll('.choice-btn').forEach(b => (b.disabled = true));

    if (isRight) {
      btn.classList.add('correct');
      SFX.success();
      $feedback.textContent = lvl.feedbackOk;
      $feedback.className   = 'feedback ok';

      setTimeout(() => {
        currentLevel++;
        if (currentLevel < LEVELS.length) {
          $progress.style.width = ((currentLevel / LEVELS.length) * 100) + '%';
          renderLevel();
        } else {
          showFinish();
        }
      }, 2000);

    } else {
      btn.classList.add('wrong');
      SFX.error();
      $feedback.textContent = lvl.feedbackErr;
      $feedback.className   = 'feedback err';

      setTimeout(() => {
        btn.classList.remove('wrong');
        $choices.querySelectorAll('.choice-btn').forEach(b => (b.disabled = false));
        $feedback.textContent = '';
        locked = false;
      }, 1000);
    }
  }

  /* Bitiş ekranı */
  function showFinish() {
    showOnly($finish);
    $progress.style.width = '100%';
    SFX.fanfare();
    setTimeout(spawnConfetti, 400);
    setTimeout(spawnConfetti, 1200);
  }

  /* Sıfırla */
  function reset() {
    currentLevel = 0;
    locked = false;
    showOnly($game);
    renderLevel();
  }

  /* Butonları bağla */
  document.getElementById('start-btn').addEventListener('click', start);
  document.getElementById('restart-btn').addEventListener('click', reset);

  /* Sayfa yüklenince başlangıç ekranını göster */
  showOnly($start);

})();
</script>
</body>
</html>
