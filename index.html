<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uzay Macerası - Matematik Oyunu</title>
<style>
:root {
  --bg:    #060b1f;
  --card:  #111a3e;
  --bdr:   rgba(120,90,255,0.25);
  --acc:   #7b5cfa;
  --pink:  #ff6b9d;
  --gold:  #ffd666;
  --green: #3dffa0;
  --red:   #ff4d6d;
  --text:  #e8eeff;
  --muted: #7788bb;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}
#starfield {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
}
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 16px;
}
.screen { display: none; flex-direction: column; align-items: center; width: min(520px,100%); text-align: center; }
.screen.on { display: flex; }

/* Başlangıç */
.big-emoji { font-size: 5rem; animation: bob 1.4s ease-in-out infinite alternate; margin-bottom: 14px; }
.main-title {
  font-size: clamp(1.8rem,6vw,2.8rem); font-weight: 800; margin-bottom: 10px;
  background: linear-gradient(90deg,var(--acc),var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.main-desc { color: var(--muted); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; max-width: 360px; }

.btn-go {
  padding: 15px 44px; border: none; border-radius: 12px;
  background: linear-gradient(135deg,var(--acc),var(--pink));
  color: #fff; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: transform .15s, opacity .15s;
  -webkit-text-fill-color: #fff;
}
.btn-go:hover { opacity: .88; transform: scale(1.04); }

/* Progress */
.prog-wrap { width: 100%; margin-bottom: 20px; }
.prog-labels { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 6px; }
.prog-track { height: 10px; background: var(--card); border-radius: 999px; border: 1px solid var(--bdr); overflow: hidden; }
.prog-fill  { height: 100%; border-radius: 999px; background: linear-gradient(90deg,var(--acc),var(--pink)); transition: width .5s ease; width: 0%; }

/* Kart */
.card {
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: 18px; padding: 28px 24px 22px;
  box-shadow: 0 0 60px rgba(123,92,250,.1); width: 100%;
}
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .73rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--gold); background: rgba(255,214,102,.1); border: 1px solid rgba(255,214,102,.3);
  border-radius: 999px; padding: 4px 12px; margin-bottom: 14px;
}
.q-emoji { font-size: 2.5rem; margin-bottom: 8px; }
.q-text  { font-size: clamp(1rem,3vw,1.18rem); font-weight: 600; line-height: 1.6; margin-bottom: 24px; min-height: 56px; }
.q-text .hl { color: var(--gold); }

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  width: 100%; padding: 13px 20px;
  background: rgba(123,92,250,.09); border: 1.5px solid rgba(123,92,250,.28);
  border-radius: 11px; color: var(--text); font-size: 1.05rem; font-weight: 600;
  cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
}
.choice:hover:not([disabled]) { background: rgba(123,92,250,.2); border-color: rgba(123,92,250,.7); transform: translateY(-2px); }
.choice[disabled] { cursor: not-allowed; }
.choice.ok   { background: rgba(61,255,160,.15) !important; border-color: var(--green) !important; color: var(--green) !important; }
.choice.fail { background: rgba(255,77,109,.15) !important; border-color: var(--red)   !important; color: var(--red)   !important; animation: shake .45s ease; }

.feedback { min-height: 24px; margin-top: 14px; font-size: .9rem; font-weight: 600; text-align: center; }
.fb-ok   { color: var(--green); }
.fb-fail { color: var(--red); }

/* Bitiş */
.fin-icon {
  font-size: 4.5rem; animation: bob 1.2s ease-in-out infinite alternate; margin-bottom: 14px;
}
.fin-title {
  font-size: clamp(1.5rem,5vw,2.1rem); font-weight: 800; line-height: 1.2; margin-bottom: 8px;
  background: linear-gradient(90deg,var(--gold),var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.fin-sub { color: var(--muted); font-size: .98rem; margin-bottom: 28px; }

@keyframes bob   { from { transform: translateY(0); } to { transform: translateY(-14px); } }
@keyframes shake { 0%{transform:translateX(0)} 15%{transform:translateX(-10px)} 30%{transform:translateX(10px)} 45%{transform:translateX(-7px)} 60%{transform:translateX(7px)} 80%{transform:translateX(-3px)} 100%{transform:translateX(0)} }

.konfeti {
  position: fixed; top: -30px; font-size: 1.6rem;
  pointer-events: none; z-index: 9999;
  animation: fall linear forwards;
}
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(700deg); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">

  <div id="sc-start" class="screen on">
    <div class="big-emoji">&#x1F680;</div>
    <h1 class="main-title">Uzay Macerası</h1>
    <p class="main-desc">3 matematik bulmacasını çöz, roketi yönlendir ve gezegene in!</p>
    <button class="btn-go" id="btn-start">Göreve Başla &#x1F6F8;</button>
  </div>

  <div id="sc-game" class="screen">
    <div class="prog-wrap">
      <div class="prog-labels">
        <span id="lbl-asama">Aşama 1 / 3</span>
        <span id="lbl-konu">Isınma</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
    </div>
    <div class="card">
      <div class="badge" id="q-badge">Level 1</div>
      <div class="q-emoji" id="q-emoji">&#x1F6F8;</div>
      <div class="q-text"  id="q-text"></div>
      <div class="choices" id="choices-wrap"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <div id="sc-finish" class="screen">
    <div class="fin-icon">&#x1F3C6;</div>
    <h2 class="fin-title">Gezegene Başarıyla İndin!</h2>
    <p class="fin-sub">&#x1F389; Görev Tamamlandı! Tüm bulmacaları çözdün. &#x1F680;</p>
    <button class="btn-go" id="btn-restart">&#x1F504; Tekrar Oyna</button>
  </div>

</div><script>
document.addEventListener('DOMContentLoaded', function () {

  /* ===== YILDIZ ARKA PLAN ===== */
  var cv = document.getElementById('starfield');
  var cx = cv.getContext('2d');
  var stars = [];

  function resizeCanvas() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    stars = [];
    var n = Math.floor(cv.width * cv.height / 4800);
    for (var i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        d: (Math.random() * 0.005 + 0.001) * (Math.random() > 0.5 ? 1 : -1)
      });
    }
  }

  function drawFrame() {
    cx.clearRect(0, 0, cv.width, cv.height);
    var g = cx.createLinearGradient(0, 0, 0, cv.height);
    g.addColorStop(0,   '#060b1f');
    g.addColorStop(0.5, '#0e0a2e');
    g.addColorStop(1,   '#060b1f');
    cx.fillStyle = g;
    cx.fillRect(0, 0, cv.width, cv.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.a += s.d;
      if (s.a > 1 || s.a < 0) s.d *= -1;
      cx.beginPath();
      cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(255,255,255,' + s.a.toFixed(2) + ')';
      cx.fill();
    }
    requestAnimationFrame(drawFrame);
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  drawFrame();

  /* ===== SES MOTORU ===== */
  var audioCtx = null;

  function getAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playTone(freq, type, vol, delay, dur) {
    var ac = getAudio();
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    gain.gain.setValueAtTime(vol, ac.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + dur + 0.05);
  }

  function sfxOk() {
    var notes = [[440,0],[550,0.12],[660,0.24],[880,0.36]];
    for (var i = 0; i < notes.length; i++) {
      playTone(notes[i][0], 'sine', 0.2, notes[i][1], 0.35);
    }
  }

  function sfxErr() {
    var ac = getAudio();
    var osc = ac.createOscillator();
    var gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(280, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(70, ac.currentTime + 0.35);
    gain.gain.setValueAtTime(0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.38);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.45);
  }

  function sfxWin() {
    var notes = [[523,0],[659,0.15],[784,0.3],[1047,0.45],[784,0.62],[1047,0.78]];
    for (var i = 0; i < notes.length; i++) {
      playTone(notes[i][0], 'triangle', 0.22, notes[i][1], 0.45);
    }
  }

  /* ===== KONFETİ ===== */
  function patlat() {
    var em = ['\u{1F680}','\u2B50','\u{1F31F}','\u2728','\u{1F389}','\u{1F4AB}','\u{1FA90}','\u{1F6F8}','\u{1F320}','\u{1F38A}'];
    for (var i = 0; i < 50; i++) {
      (function() {
        var el = document.createElement('div');
        el.className = 'konfeti';
        el.textContent = em[Math.floor(Math.random() * em.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (1.1 + Math.random() * 1.5).toFixed(1) + 'rem';
        el.style.animationDuration = (2.5 + Math.random() * 2.5).toFixed(1) + 's';
        el.style.animationDelay    = (Math.random() * 1.8).toFixed(2) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', function() { el.remove(); });
      })();
    }
  }

  /* ===== LEVEL VERİSİ ===== */
  var LEVELS = [
    {
      badge:   'Level 1 - Isınma',
      konu:    'Isınma',
      emoji:   '\u{1F680}',
      html:    'Roketin yakıt tankını açmak için <span class="hl">x</span> değerini bul:<br><br>2x + 5 = 15',
      choices: ['5', '10', '4'],
      answer:  '5',
      msgOk:   'Harika! Yakıt tankı açıldı!',
      msgErr:  'Yanlış! Tekrar dene.'
    },
    {
      badge:   'Level 2 - Kesirler',
      konu:    'Kesirler',
      emoji:   '\u{1F6E1}',
      html:    'Kalkanları şarj et:<br><br><span class="hl">1/2 + 1/4 = ?</span>',
      choices: ['3/4', '2/6', '1/8'],
      answer:  '3/4',
      msgOk:   'Mükemmel! Kalkanlar şarj oldu!',
      msgErr:  'Yanlış! Kesirleri tekrar düşün.'
    },
    {
      badge:   'Level 3 - Şifre',
      konu:    'Şifre',
      emoji:   '\u{1FA90}',
      html:    'Gezegene inmek için şifreyi çöz:<br><br><span class="hl">Hangi sayının yarısının 3 fazlası 10\'dur?</span>',
      choices: ['14', '17', '20'],
      answer:  '14',
      msgOk:   'Şifreyi kırdın! İnişe hazır!',
      msgErr:  'Yanlış kod! Tekrar dene.'
    }
  ];

  /* ===== OYUN DURUMU ===== */
  var currentLevel = 0;
  var locked = false;

  /* ===== EKRAN YÖNETİMİ ===== */
  function showScreen(id) {
    var screens = ['sc-start', 'sc-game', 'sc-finish'];
    for (var i = 0; i < screens.length; i++) {
      var el = document.getElementById(screens[i]);
      if (el) el.classList.remove('on');
    }
    var target = document.getElementById(id);
    if (target) target.classList.add('on');
  }

  /* ===== LEVEL RENDER ===== */
  function renderLevel() {
    locked = false;
    var L = LEVELS[currentLevel];

    var pct = Math.round(currentLevel / LEVELS.length * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('lbl-asama').textContent = 'Aşama ' + (currentLevel + 1) + ' / ' + LEVELS.length;
    document.getElementById('lbl-konu').textContent  = L.konu;
    document.getElementById('q-badge').textContent   = L.badge;
    document.getElementById('q-emoji').textContent   = L.emoji;
    document.getElementById('q-text').innerHTML      = L.html;

    var fb = document.getElementById('feedback');
    fb.textContent = '';
    fb.className   = 'feedback';

    var wrap = document.getElementById('choices-wrap');
    wrap.innerHTML = '';
    for (var i = 0; i < L.choices.length; i++) {
      (function(choice) {
        var btn = document.createElement('button');
        btn.className   = 'choice';
        btn.textContent = choice;
        btn.addEventListener('click', function() {
          handlePick(btn, choice);
        });
        wrap.appendChild(btn);
      })(L.choices[i]);
    }
  }

  /* ===== CEVAP İŞLE ===== */
  function handlePick(btn, val) {
    if (locked) return;
    locked = true;

    var L   = LEVELS[currentLevel];
    var all = document.querySelectorAll('.choice');
    for (var i = 0; i < all.length; i++) all[i].disabled = true;

    var fb = document.getElementById('feedback');

    if (val === L.answer) {
      btn.classList.add('ok');
      sfxOk();
      fb.textContent = L.msgOk;
      fb.className   = 'feedback fb-ok';

      setTimeout(function() {
        currentLevel++;
        if (currentLevel < LEVELS.length) {
          renderLevel();
        } else {
          showScreen('sc-finish');
          document.getElementById('prog-fill').style.width = '100%';
          sfxWin();
          setTimeout(patlat, 350);
          setTimeout(patlat, 1100);
        }
      }, 2000);

    } else {
      btn.classList.add('fail');
      sfxErr();
      fb.textContent = L.msgErr;
      fb.className   = 'feedback fb-fail';

      setTimeout(function() {
        btn.classList.remove('fail');
        for (var i = 0; i < all.length; i++) all[i].disabled = false;
        fb.textContent = '';
        fb.className   = 'feedback';
        locked = false;
      }, 1000);
    }
  }

  /* ===== BAŞLAT / SIFIRLA ===== */
  function baslat() {
    currentLevel = 0;
    locked = false;
    showScreen('sc-game');
    renderLevel();
  }

  /* ===== BUTON BAĞLANTILARI ===== */
  var btnStart   = document.getElementById('btn-start');
  var btnRestart = document.getElementById('btn-restart');

  if (btnStart)   btnStart.addEventListener('click',   baslat);
  if (btnRestart) btnRestart.addEventListener('click',  baslat);

}); /* DOMContentLoaded sonu */
</script>
</body>
</html>
